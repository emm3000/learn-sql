services:
  db:
    image: postgres:16-alpine
    container_name: postgres-hola-mundo
    environment:
      POSTGRES_DB: aprendizaje
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro

volumes:
  pgdata:
